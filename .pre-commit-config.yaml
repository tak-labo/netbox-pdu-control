ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autofix_commit_msg: "style: pre-commit fixes"

repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
    -   id: ruff
        name: "Ruff linter"
        args: [--fix, netbox_pdu_control/]
    -   id: ruff-format
        name: "Ruff formatter"
        args: [netbox_pdu_control/]

-   repo: https://github.com/mgedmin/check-manifest
    rev: "0.51"
    hooks:
      - id: check-manifest
        stages: [manual]

-   repo: local
    hooks:
    -   id: mkdocs-build
        name: "Build documentation"
        description: "Build the documentation with mkdocs"
        files: 'docs/'
        entry: .hooks/mkdocs-build.sh
        language: system
        pass_filenames: false

    -   id: django-tests
        name: "Run Django integration tests"
        description: "Run plugin tests via Docker before push"
        entry: docker compose -f ../netbox-docker/docker-compose.yml -f ../netbox-docker/docker-compose.override.yml exec -T netbox python manage.py test netbox_pdu_control.tests -v 2
        language: system
        pass_filenames: false
        stages: [pre-push]
